services:
  postgres:
    image: postgres:16
    container_name: lb2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lb2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/db/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
